# =============================================================================
# OptiTide on Coolify — Docker Compose deployment.
#
# One image (built from ./Dockerfile), four process types. PostgreSQL is a
# SEPARATE Coolify-managed database — wire it in with DB_URL below.
#
# Env values below are interpolated from the variables you set in the Coolify
# resource's "Environment Variables" panel (see .env.coolify.example and
# docs/DEPLOY.coolify.md). The `x-app-environment` anchor is shared by every
# service so the whole stack sees the same config.
# =============================================================================

x-build: &build
  context: .
  dockerfile: Dockerfile
  args:
    # Compiled into the browser bundle — must be present at build time.
    VITE_APP_NAME: ${APP_NAME:-OptiTide}
    VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
    VITE_REVERB_HOST: ${REVERB_HOST}
    VITE_REVERB_PORT: ${REVERB_PORT:-443}
    VITE_REVERB_SCHEME: ${REVERB_SCHEME:-https}

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-OptiTide}
  APP_ENV: production
  APP_KEY: ${APP_KEY}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL}
  APP_LOCALE: ${APP_LOCALE:-en}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-en_US}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  # Logs to stderr for Coolify's log viewer (no persistent disk).
  LOG_CHANNEL: stderr
  LOG_STDERR_FORMATTER: Monolog\Formatter\JsonFormatter
  LOG_LEVEL: ${LOG_LEVEL:-warning}
  LOG_DEPRECATIONS_CHANNEL: "null"
  # Database — Coolify-managed Postgres. Paste its connection URL into DB_URL.
  DB_CONNECTION: pgsql
  DB_URL: ${DB_URL}
  # Redis is optional; the app defaults to database-backed drivers below.
  REDIS_URL: ${REDIS_URL:-}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  CACHE_STORE: ${CACHE_STORE:-database}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_SECURE_COOKIE: "true"
  # Private artifacts must live off the ephemeral container FS → S3.
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-s3}
  FILESYSTEM_PRIVATE_DISK: ${FILESYSTEM_PRIVATE_DISK:-s3}
  SIGNATURES_DISK: ${SIGNATURES_DISK:-s3}
  BACKUP_DISK: ${BACKUP_DISK:-s3}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
  AWS_BUCKET: ${AWS_BUCKET:-}
  AWS_ENDPOINT: ${AWS_ENDPOINT:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
  # Broadcasting / Reverb. The container binds 0.0.0.0:8080; the browser
  # connects to REVERB_HOST over 443 (wss) via Coolify's edge.
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: ${REVERB_APP_ID}
  REVERB_APP_KEY: ${REVERB_APP_KEY}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET}
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080
  REVERB_HOST: ${REVERB_HOST}
  REVERB_PORT: ${REVERB_PORT:-443}
  REVERB_SCHEME: ${REVERB_SCHEME:-https}
  # Mail
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@optitide.io}
  MAIL_FROM_NAME: ${APP_NAME:-OptiTide}
  # Payments (Stripe) — webhook fails closed until the secret is set.
  STRIPE_KEY: ${STRIPE_KEY:-}
  STRIPE_SECRET: ${STRIPE_SECRET:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  CASHIER_CURRENCY: ${CASHIER_CURRENCY:-aud}
  STRIPE_AUTOMATIC_TAX: ${STRIPE_AUTOMATIC_TAX:-false}
  # AI (Claude) — falls back to a fake client without a key.
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
  ANTHROPIC_EFFORT: ${ANTHROPIC_EFFORT:-high}
  # Social login (buttons hidden until client IDs are set).
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
  # Optional integrations (all no-op when unset).
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  GITHUB_OWNER: ${GITHUB_OWNER:-}
  WHM_HOST: ${WHM_HOST:-}
  WHM_USERNAME: ${WHM_USERNAME:-}
  WHM_API_TOKEN: ${WHM_API_TOKEN:-}
  # Company / AU tax invoice details (GST is inclusive).
  COMPANY_LEGAL_NAME: ${COMPANY_LEGAL_NAME:-}
  COMPANY_ABN: ${COMPANY_ABN:-}
  COMPANY_EMAIL: ${COMPANY_EMAIL:-}
  COMPANY_ADDRESS_LINE1: ${COMPANY_ADDRESS_LINE1:-}
  COMPANY_ADDRESS_LOCALITY: ${COMPANY_ADDRESS_LOCALITY:-}
  COMPANY_ADDRESS_REGION: ${COMPANY_ADDRESS_REGION:-}
  COMPANY_ADDRESS_POSTCODE: ${COMPANY_ADDRESS_POSTCODE:-}
  COMPANY_ADDRESS_COUNTRY: ${COMPANY_ADDRESS_COUNTRY:-AU}
  COMPANY_GST_REGISTERED: ${COMPANY_GST_REGISTERED:-true}
  COMPANY_GST_BASIS_POINTS: ${COMPANY_GST_BASIS_POINTS:-1000}

services:
  # HTTP app (Filament admin + client panels + storefront). Migrates on deploy.
  # Assign this service's public domain in Coolify → target port 8080.
  # Keep at exactly ONE replica (it owns migrations).
  web:
    build: *build
    image: optitide-app
    restart: unless-stopped
    environment:
      <<: *app-environment
      PUBLISH_ASSETS: "true"
      RUN_MIGRATIONS: "true"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 150s

  # Queue worker (database queue). --max-time recycles it hourly; restart policy
  # brings it back after the clean exit.
  worker:
    build: *build
    image: optitide-app
    restart: unless-stopped
    environment: *app-environment
    command: ["php", "artisan", "queue:work", "--tries=3", "--backoff=10", "--sleep=3", "--max-time=3600"]
    depends_on:
      web:
        condition: service_healthy

  # Scheduler — schedule:work invokes schedule:run every 60s. Keep at ONE replica.
  scheduler:
    build: *build
    image: optitide-app
    restart: unless-stopped
    environment: *app-environment
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      web:
        condition: service_healthy

  # Reverb websockets. Assign its own public domain in Coolify → target port
  # 8080; the browser connects over wss/443 via the edge.
  reverb:
    build: *build
    image: optitide-app
    restart: unless-stopped
    environment: *app-environment
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    expose:
      - "8080"
