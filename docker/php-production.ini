; Production PHP settings for OptiTide (FrankenPHP container).
memory_limit = 512M
upload_max_filesize = 20M
post_max_size = 24M
max_execution_time = 120
expose_php = Off

; OPcache — code never changes without a rebuild, so timestamp validation is
; disabled for speed. The entrypoint writes the config/route caches BEFORE the
; server starts, so each fresh container compiles them cleanly.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
